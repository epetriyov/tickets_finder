name: Deploy

# Деплой на КАЖДЫЙ пуш в main: SSH на VPS, обновление кода до origin/main,
# пересборка и перезапуск docker compose.
# Секреты (GitHub Secrets): VPS_HOST, VPS_USER, VPS_SSH_KEY, VPS_APP_DIR (опц.).
# Предварительно один раз на VPS: клонировать репозиторий в APP_DIR и положить .env.
on:
  push:
    branches: [main]

# Два пуша подряд не должны деплоиться одновременно; недеплойнутый
# промежуточный коммит не страшен — деплоим всегда origin/main.
concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail
            APP_DIR="${{ secrets.VPS_APP_DIR }}"
            APP_DIR="${APP_DIR:-/opt/tickets_finder}"
            cd "$APP_DIR"
            git fetch origin main
            git checkout main
            git reset --hard origin/main
            docker compose build
            docker compose up -d
            docker compose ps
