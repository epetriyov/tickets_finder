name: Deploy

# Деплой по тегу vX.Y.Z (схема как в jobpilot): SSH на VPS, checkout тега,
# пересборка и перезапуск docker compose.
# Секреты (GitHub Secrets): VPS_HOST, VPS_USER, VPS_SSH_KEY, VPS_APP_DIR (опц.).
# Предварительно один раз на VPS: клонировать репозиторий в APP_DIR и положить .env.
on:
  push:
    tags: ["v*"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail
            APP_DIR="${{ secrets.VPS_APP_DIR }}"
            APP_DIR="${APP_DIR:-/opt/tickets_finder}"
            cd "$APP_DIR"
            git fetch --all --tags
            git checkout "${{ github.ref_name }}"
            docker compose build
            docker compose up -d
            docker compose ps
